# Nginx reverse proxy config for IGo Academy Platform
# Place at: /etc/nginx/sites-available/igo-platform

server {
    listen 80;
    server_name igoacademy.in www.igoacademy.in;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name igoacademy.in www.igoacademy.in;

    # SSL certificates (Let's Encrypt / ACM)
    ssl_certificate     /etc/ssl/igo/fullchain.pem;
    ssl_certificate_key /etc/ssl/igo/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ── API proxy ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Rate limit API
        limit_req zone=api burst=20 nodelay;
    }

    # ── Socket.io ──────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }

    # ── React SPA ──────────────────────────────────────────
    location / {
        root  /var/www/igo-platform/client/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Health check (no auth) ─────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:5000;
        access_log off;
    }

    # Logs
    access_log /var/log/nginx/igo-platform.access.log;
    error_log  /var/log/nginx/igo-platform.error.log;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
